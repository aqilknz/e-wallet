<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Wallet Register</title>
    <link rel="stylesheet" href="./styles/register.css">
</head>
<body>
    <main class="container">
        <section class="left__section">
            <header class="logo">
                <img src="src/money-wallet.png" alt="money-wallet.png">
                <span>E-Wallet</span>
            </header>
            <article class="content">
                <h1>Start Accessing Banking Needs With All Devices and All Platforms With 30.000+ Users</h1>
                <p>Transfering money is easier than ever, you can access Zwallet wherever you are. Desktop, laptop mobile phone? we cover all of that for you</p>
            </article>
            <section class="social__login">
                <button class="google">
                    <img src="src/google.png" alt="google.png">
                    <span>Sign In With Google</span>
                </button>
                <button class="facebook">
                    <img src="src/facebook.png" alt="facebook.png">
                    <span>Sign In With Facebook</span>
                </button>
                <div class="separator">
                    <span>Or</span>
                </div>
            </section>
            <form>
                <div class="input__register">
                    <label for="email">Email</label>
                    <input type="email" name="email" placeholder="Enter your email">
                </div>
                <div class="input__register">
                    <label for="password">Password</label>
                    <input type="password" name="password" placeholder="Enter your password">
                </div>
                <div class="input__register">
                    <label for="password">Confirm Pasword</label>
                    <input type="password" name="password" placeholder="Confirm your password">
                </div>
                <button type="submit" class="register__button">Register</button>
            </form>
            <footer class="login__link">
                <span>Have An Account? </span>
                <a href="./login.html">Login</a>
            </footer>
        </section>
        <section class="right">
            <img src="src/wallet.png" alt="wallet.png">
        </section>
    </main>
</body>
</html>
