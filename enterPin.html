<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enter PIN</title>
    <link rel="stylesheet" href="styles/enterPin.css">
</head>
<body>
    <main class="container">
        <section class="left__section">
            <header class="logo">
                <img src="src/money-wallet.png" alt="money-wallet.png">
                <span>E-Wallet</span>
            </header>
            <article class="content">
                <h1>Enter you Pin👋</h1>
                <p>Please save your pin because this so important.</p>
            </article>
            <section class="pin__container">
                <input type="text" maxlength="1" inputmode="numeric">
                <input type="text" maxlength="1" inputmode="numeric">
                <input type="text" maxlength="1" inputmode="numeric">
                <input type="text" maxlength="1" inputmode="numeric">
                <input type="text" maxlength="1" inputmode="numeric">
                <input type="text" maxlength="1" inputmode="numeric">
            </section>
            <button type="submit" class="submit__button">Submit</button>
            <footer class="reset__link">
                <span>Forget Your Pin?</span>
                <a href="">Reset</a>
            </footer>
        </section>
        <section class="right__section">
            <img src="src/people.png" alt="people.png">
        </section>
    </main>
    
</body>
</html>
