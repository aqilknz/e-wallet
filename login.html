<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Wallet Login</title>
    <link rel="stylesheet" href="./styles/login.css">
</head>
<body>
    <main class="container">
        <section class="left__section">
            <header class="logo">
                <img src="src/money-wallet.png" alt="money-wallet.png">
                <span>E-Wallet</span>
            </header>
            <article class="content">
                <h1>Hello Welcome Back 👋</h1>
                <p>Fill out the form correctly or you can login with several option.</p>
            </article>
            <section class="social__login">
                <button class="google">
                    <img src="src/google.png" alt="google.png">
                    <span>Sign In With Google</span>
                </button>
                <button class="facebook">
                    <img src="src/facebook.png" alt="facebook.png">
                    <span>Sign In With Facebook</span>
                </button>
                <div class="separator">
                    <span>Or</span>
                </div>
            </section>
            <form>
                <div class="input__login">
                    <label for="email">Email</label>
                    <input type="email" name="email" placeholder="Enter your email">
                </div>
                <div class="input__login">
                    <label for="password">Password</label>
                    <input type="password" class="picturePass" name="password" placeholder="Enter your password">
                </div>
                <button type="submit" class="login__button">Login</button>
            </form>
            <footer class="register__link">
                <span>Not Have An Account? </span>
                <a href="register.html">Register</a>
            </footer>
        </section>
        <section class="right">
            <img src="src/login.png" alt="login.png">
        </section>
    </main>
</body>
</html>
