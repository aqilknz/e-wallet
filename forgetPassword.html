<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forget Password Form</title>
    <link rel="stylesheet" href="styles/forgetPassword.css">
</head>
<body>
    <main class="container">
        <header class="logo">
            <img src="src/money-wallet.png" alt="money-wallet.png">
            <span>E-Wallet</span>
        </header>
        <article class="content">
            <h1>Fill Out Form Correctly 👋</h1>
            <p>We will send new password to your email</p>
        </article>
        <form>
            <div class="input__email">
                <label for="email">Email</label>
                <input type="email" name="email" placeholder="✉︎ Enter Your Email">
            </div>
            <a href="login.html">
                <button type="submit" class="submit">Submit</button>
            </a>
        </form>
    </main>
</body>
</html>
