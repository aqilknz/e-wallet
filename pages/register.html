<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Wallet Login</title>
    <link rel="stylesheet" href="../styles/register.css">
</head>
<body>
    <main class="container">
        <section class="left-section">
            <header class="logo">
                <img src="../src/icons/Money Wallet.svg" alt="E-Wallet Logo">
                <span>E-Wallet</span>
            </header>
            <div class="content">
                <h1>Start Accessing Banking Needs
                    With All Devices and All Platforms
                    With 30.000+ Users</h1>
                <p>Transfering money is eassier than ever, you can access Zwallet wherever you are. Desktop, laptop,
                    mobile phone? we cover all of that for you!</p>
            </div>
            <div class="social-login">
                <button type="button" class="google">
                    <img src="../src/icons/flat-color-icons_google.svg" alt="Google Logo">
                    <span>Sign In With Google</span>
                </button>
                <button type="button" class="facebook">
                    <img src="../src/icons/bx_bxl-facebook-circle.svg" alt="Facebook Logo">
                    <span>Sign In With Facebook</span>
                </button>
                <div class="separator">
                    <span>Or</span>
                </div>
            </div>
            <form action="#">
                <div class="input-login">
                    <label for="email">Email</label>
                    <div class="input-wrapper">
                        <img src="../src/icons/mail.svg" alt="" class="input-icon" aria-hidden="true">
                        <input type="email" id="email" name="email" placeholder="Enter Your Email" autocomplete="email"
                            required>
                    </div>
                </div>
                <div class="input-login">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <img src="../src/icons/Password.svg" alt="" class="input-icon left-icon" aria-hidden="true">
                        <input type="password" class="picturePass" id="password" name="password"
                            placeholder="Enter Your Password" autocomplete="current-password" required>
                    </div>
                </div>
                <div class="input-login">
                    <label for="confirm-password">Confirm Password</label>
                    <div class="input-wrapper">
                        <img src="../src/icons/Password.svg" alt="" class="input-icon left-icon" aria-hidden="true">
                        <input type="password" id="confirm-password" name="confirm-password"
                            placeholder="Enter Your Password Again" autocomplete="new-password" required>
                    </div>
                </div>
                <button type="submit" class="login-button">Register</button>
            </form>
            <p class="login-link">
                <span>Have An Account? </span>
                <a href="login.html">Login</a>
            </p>
        </section>
        <aside class="right">
            <img src="../src/icons/register.svg" alt="register.svg">
        </aside>
    </main>
</body>

</html>
