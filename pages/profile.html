<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile</title>
    <link rel="stylesheet" href="../styles/dashboardv1.css">
    <link rel="stylesheet" href="../styles/profile.css">
</head>

<body>

    <header class="main-header">
        <div class="left">
            <div class="logo">
                <img src="../src/icons/Money Wallet.svg" alt="Logo">
                <span>E-Wallet</span>
            </div>
        </div>
        <div class="right">
            <div class="user-profile">
                <span class="user-name">Ghaluh Wizard</span>
                <div class="avatar-container">
                    <img src="../src/images/Ellipse 185.svg" alt="User" class="avatar">
                    <span class="dropdown-arrow"><img src="../src/icons/down (1).svg" alt=""></span>
                </div>
            </div>
        </div>
    </header>

    <div class="container">
        <aside class="sidebar">
            <nav class="menu">
                <button type="button" class="menu-item">
                    <img src="../src/icons/dashboard-two-wht.svg" alt="Dashboard" class="icon-img">
                    <a href="dashboardv1.html">Dashboard</a>
                </button>
                <button type="button" class="menu-item">
                    <img src="../src/icons/Send.svg" alt="Transfer" class="icon-img">
                    <a href="transfer.html">Transfer</a>
                </button>
                <button type="button" class="menu-item">
                    <img src="../src/icons/history.svg" alt="History" class="icon-img">
                    <a href="history.html">History</a>
                </button>
                <button type="button" class="menu-item">
                    <img src="../src/icons/Upload.svg" alt="Top Up" class="icon-img">
                    <a href="topup.html">Top Up</a>
                </button>
                <button type="button" class="menu-item active prof">
                    <img src="../src/icons/2 User.svg" alt="Profile" class="icon-img">
                    <a href="profile.html">Profile</a>
                </button>
                <button type="button" class="menu-item logout">
                    <img src="../src/icons/Log Out.svg" alt="Keluar" class="icon-img">
                    <a href="../index.html">Keluar</a>
                </button>
            </nav>
        </aside>

        <main class="main-content">
            <div class="profile-title-container">
                <img src="../src/icons/2 User-blue.svg" alt="Profile Icon" class="title-icon">
                <h2>Profile</h2>
            </div>

            <section class="card profile-main-card">
                <form class="profile-form">
                    <div class="form-section">
                        <label class="section-label">Profile Picture</label>
                        <div class="profile-pic">
                            <div class="avatar-placeholder">
                                <img src="../src/icons/Profile1.svg" alt="Default Avatar">
                            </div>
                            <div class="pic-actions">
                                <button type="button" class="btn-action change-btn">
                                    <img src="../src/icons/edit-2.svg" alt=""> Change Profile
                                </button>
                                <button type="button" class="btn-action delete-profile-btn">
                                    <img src="../src/icons/trash-red.svg" alt=""> Delete Profile
                                </button>
                            </div>
                        </div>
                        <p class="helper-text">The profile picture must be 512 x 512 pixels or less</p>
                    </div>

                    <div class="form-group">
                        <label>Full Name</label>
                        <div class="input-wrapper">
                            <img src="../src/icons/User (1).svg" alt="" class="input-icon">
                            <input type="text" placeholder="Ghaluh Wizard Anggoro">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Phone</label>
                        <div class="input-wrapper">
                            <img src="../src/icons/Phone.svg" alt="" class="input-icon">
                            <input type="text" placeholder="6282116304337">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Email</label>
                        <div class="input-wrapper">
                            <img src="../src/icons/mail.svg" alt="" class="input-icon">
                            <input type="email" placeholder="ghaluhwizz@gmail.com">
                        </div>
                    </div>

                    <div class="settings-group">
                        <div class="setting-item">
                            <label>Password</label>
                            <a href="change-pass.html" class="link-action">Change Password</a>
                        </div>
                        <div class="setting-item">
                            <label>Pin</label>
                            <a href="change-pin.html" class="link-action">Change Pin</a>
                        </div>
                    </div>

                    <button type="submit" class="submit-btn">Submit</button>
                </form>
            </section>
        </main>
    </div>

</body>

</html>
