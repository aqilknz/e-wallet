<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forget Password</title>
    <link rel="stylesheet" href="../styles/forgetPassword.css">
</head>
<body>
    <main class="container">
        <div class="card">
            <header class="logo">
                <img src="../src/icons/Money Wallet.svg" alt="E-Wallet Logo">
                <span>E-Wallet</span>
            </header>
            <div class="content">
                <h1>Fill Out Form Correctly 👋</h1>
                <p>We will send new password to your email</p>
            </div>
            <form action="#">
                <div class="input-email">
                    <label for="email">Email</label>
                    <div class="input-wrapper">
                        <img src="../src/icons/mail.svg" alt="" class="input-icon" aria-hidden="true">
                        <input type="email" id="email" name="email" placeholder="Enter Your Email" autocomplete="email" required>
                    </div>
                </div>
                <button type="submit" class="submit-button">Submit</button>
            </form>
        </div>
    </main>
</body>
</html>
