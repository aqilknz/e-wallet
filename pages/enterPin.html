<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enter PIN</title>
    <link rel="stylesheet" href="../styles/enterPin.css">
</head>
<body>
    <main class="container">
        <section class="left-section">
            <header class="logo">
                <img src="../src/icons/Money Wallet.svg" alt="E-Wallet Logo">
                <span>E-Wallet</span>
            </header>
            <div class="content">
                <h1>Enter Your Pin 👋</h1>
                <p>Please save your pin because this so important.</p>
            </div>
            <div class="pin-container">
                <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
                <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
                <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
                <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
                <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
                <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
            </div>
            <button type="submit" class="submit-button">Submit</button>
            <p class="reset-link">
                <span>Forgot Your Pin? </span>
                <a href="">Reset</a>
            </p>
        </section>
        <aside class="right">
            <img src="../src/icons/peoplePin.svg.svg" alt="peoplePin.svg">
        </aside>
    </main>
</body>
</html>
